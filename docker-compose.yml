version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ssl_db
    environment:
      - POSTGRES_DB=sslautomation
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgrespassword
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  backend:
    build: ./backend
    container_name: ssl_backend
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - DATABASE_URL=postgres://postgres:postgrespassword@db:5432/sslautomation
    depends_on:
      - db
    restart: always

  frontend:
    build: ./frontend
    container_name: ssl_frontend
    ports:
      - '3001:80'
    depends_on:
      - backend
    restart: always

volumes:
  pgdata:
