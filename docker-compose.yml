version: '3.8'

services:
  backend:
    build: ./backend
    container_name: ssl_backend
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
    restart: always

  frontend:
    build: ./frontend
    container_name: ssl_frontend
    ports:
      - '3000:3000'
    depends_on:
      - backend
    restart: always
